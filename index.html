<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokémon Race</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    #selection { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .poke { cursor: pointer; border: 2px solid transparent; }
    .poke.selected { border-color: red; }
    #race { position: relative; width: 900px; height: 400px; margin: 20px auto; border: 1px solid #000; overflow: hidden; }
    .racer { position: absolute; left: 0; }
    #result { font-size: 24px; margin-top: 20px; }
    #startBtn, #rankingBtn { margin-top: 10px; margin-right: 5px; }
  </style>
</head>
<body>

<h2>Select your Pokémon</h2>
<div id="selection"></div>

<button id="startBtn">Start Race</button>
<button id="rankingBtn">Rankings</button>

<div id="race"></div>
<div id="result"></div>

<script src="script.js"></script>
</body>
</html>
